name: Build Python Flet APK
on: 
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Pre-configure Flet Build Directory
        run: |
          mkdir -p build/apk

      - name: Compile Application to Android APK
        run: |
          flet build apk

      - name: Upload Finished Mobile Asset
        uses: actions/upload-artifact@v4
        with:
          name: python-todo-apk
          path:src/build/apk/*.apk
